- date: "2026"
  title: "Typologically diverse evaluation"
  text: "A Principled Framework for Evaluating on Typologically Diverse Languages was published in Computational Linguistics, bringing together several years of work on how multilingual NLP should be evaluated."
- date: "2026"
  title: "Coefficient Giving · Formal semantics and AI safety"
  text: "Awarded approximately DKK 2.4M for Formal Semantic Methods for AI Safety. This opens an exciting new direction connecting my work on language and meaning with emerging questions in AI safety."
- date: "2025"
  title: "DFF Sapere Aude · TRUST"
  text: "Awarded approximately DKK 6.2M for Building TRUST in Text: Linguistically Motivated Language Model Detection—a major step in establishing a sustained research programme around linguistically grounded language-model security."
- date: "2025"
  title: "NLP Security and Ethics, in the Wild"
  text: "Published in Transactions of the ACL, this paper brings together a broad research agenda for understanding security and ethics in real-world NLP systems."
- date: "2024"
  title: "Full professor at Aalborg University"
  text: "Appointed full professor of Natural Language Processing—a career milestone and the beginning of an ambitious new phase for AAU-NLP in Copenhagen."
- date: "2024"
  title: "Novo Nordisk Foundation · (LM)²-SEC"
  text: "Awarded approximately DKK 10M through the Data Science Investigator (Ascending) programme. The five-year award provides the foundation for a growing team working on security and privacy in multilingual language models."
- date: "2022"
  title: "Carlsberg Foundation · Semper Ardens: Accelerate"
  text: "Awarded DKK 5M for Multilingual Modelling for Resource-Poor Languages. The Accelerate grant was formative for both my multilingual research agenda and the development of AAU-NLP."
